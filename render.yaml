# Render Blueprint: Dashboard → New → Blueprint → nối repo (hoặc chỉnh tay từng service).
#
# --- API + Aiven MySQL (lỗi Prisma P1001 "Can't reach database server") -----------------
# Nguyên nhân thường gặp: Aiven chặn kết nối từ IP lạ — Render không nằm trong allowlist.
# Cách xử:
# - Aiven Dashboard → Service MySQL của bạn → Users / Connections / Trusted sources:
#   thêm nguồn "Internet" hoặc 0.0.0.0/0 (chỉ dev/demo) hoặc IP egress cố định (gói trả phí).
# - Kiểm tra DATABASE_URL trong Render (Environment): dùng Service URI từ Aiven Overview,
#   có ?ssl-mode=REQUIRED và mật khẩu đã URL-encode nếu cần.
# - Kiểm tra dịch vụ DB trên Aiven đang Running (trial hết có thể tạm ngắt).
#
# API: bổ sung JWT_SECRET, DATABASE_URL — bắt buộc: CORS_ORIGIN (full URL của static site).
# Khác subdomain với frontend: COOKIE_SECURE=true và COOKIE_SAMESITE=none (không chỉ các trang
# báo lỗi mà không đăng nhập được đúng trên các route cần cookie).
# Static site: VITE_API_ORIGIN = URL public của API (vd https://media-club-api.onrender.com),
# không có dấu / cuối — build Vite embed giá trị này.

services:
  - type: web
    name: media-club-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npm run prisma:generate && npm run build:api
    startCommand: cd apps/api && npm run start:render
    envVars:
      - key: NODE_VERSION
        value: "22"
      # URL front-end (comma-separated); bắt buộc khi NODE_ENV=production (đã có kiểm tra khi khởi động API).
      # Ví dụ: https://media-club-web.onrender.com — phải trùng nơi user mở trình duyệt.
      - key: CORS_ORIGIN
        sync: false
      # Nếu web và API khác host:
      # - key: COOKIE_SECURE
      #   value: "true"
      # - key: COOKIE_SAMESITE
      #   value: "none"

  # SPA (Vite + React Router): rewrite mọi path → index.html để /app/reports không 404.
  - type: web
    name: media-club-web
    runtime: static
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Trùng tên service API ở trên → URL đúng dạng https://media-club-api.onrender.com
      - key: VITE_API_ORIGIN
        value: https://media-club-api.onrender.com
