# Render Blueprint: Dashboard → New → Blueprint → nối repo (hoặc chỉnh tay từng service).
#
# API: bổ sung JWT_SECRET, DATABASE_URL, CORS_ORIGIN (phải gồm URL static site, vd
# https://media-club-web.onrender.com), COOKIE_* trong Environment.
# Static site: VITE_API_ORIGIN = URL public của API (vd https://media-club-api.onrender.com),
# không có dấu / cuối — build Vite embed giá trị này.

services:
  - type: web
    name: media-club-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npm run prisma:generate && npm run build:api
    startCommand: cd apps/api && npm run start:render
    envVars:
      - key: NODE_VERSION
        value: "22"

  # SPA (Vite + React Router): rewrite mọi path → index.html để /app/reports không 404.
  - type: web
    name: media-club-web
    runtime: static
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Trùng tên service API ở trên → URL đúng dạng https://media-club-api.onrender.com
      - key: VITE_API_ORIGIN
        value: https://media-club-api.onrender.com
